<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>생각키움연구소 재정관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bl:#185FA5;--bll:#E6F1FB;--bld:#0C447C;
  --gn:#3B6D11;--gnl:#EAF3DE;
  --rd:#A32D2D;--rdl:#FCEBEB;
  --am:#854F0B;--aml:#FAEEDA;
  --pp:#3C3489;--ppl:#EEEDFE;
  --gy:#5F5E5A;--gyl:#F1EFE8;
  --bd:#e0ddd6;--bg:#f8f7f4;--cd:#fff;
  --tx:#1a1a18;--t2:#5F5E5A;--t3:#888780;
  --r:12px;--rs:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;color:var(--tx);background:var(--bg);min-height:100vh;padding-bottom:72px}
.hdr{background:var(--bld);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr h1{font-size:16px;font-weight:600}
.hdr-sub{font-size:11px;opacity:.7;margin-top:1px}
.cdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.cdot.on{background:#5DCAA5}.cdot.off{background:#F09595}
.sbtn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 11px;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px}
.tbr{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid var(--bd);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px 6px;border:none;background:none;cursor:pointer;color:var(--t3);font-size:10px;font-family:inherit}
.tb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tb.on{color:var(--bl)}
.sc{display:none;padding:12px}.sc.on{display:block}
.card{background:var(--cd);border:0.5px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sb{background:var(--gyl);border-radius:var(--rs);padding:12px 10px}
.sb .lb{font-size:11px;color:var(--t2);margin-bottom:5px}
.sb .vl{font-size:17px;font-weight:600}
.vl.g{color:var(--gn)}.vl.r{color:var(--rd)}
.nb{text-align:center;padding:18px;background:var(--cd);border:0.5px solid var(--bd);border-radius:var(--r);margin-bottom:10px}
.nl{font-size:12px;color:var(--t2);margin-bottom:6px}
.nv{font-size:30px;font-weight:700}
.pb{display:flex;gap:6px;align-items:center;margin-bottom:10px}
.pb input{flex:1;min-width:0;font-size:13px;padding:8px 10px;border:0.5px solid var(--bd);border-radius:var(--rs);background:#fff;color:var(--tx);font-family:inherit}
.pb span{color:var(--t3);font-size:13px;flex-shrink:0}
.pb button,.qb{padding:8px 14px;background:var(--bl);color:#fff;border:none;border-radius:var(--rs);font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:500}
.st{font-size:12px;font-weight:600;color:var(--t2);margin:12px 0 5px;padding-left:2px}
.fd{margin-bottom:11px}
.fd label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px}
input[type=text],input[type=number],input[type=month],input[type=date],select{width:100%;font-size:15px;padding:11px 13px;border:0.5px solid var(--bd);border-radius:var(--rs);background:#fff;color:var(--tx);font-family:inherit;appearance:none;-webkit-appearance:none}
input[type=text]{ime-mode:active}
input:focus,select:focus{outline:none;border-color:var(--bl);box-shadow:0 0 0 3px rgba(24,95,165,.12)}
.sbtn2{width:100%;padding:14px;background:var(--bl);color:#fff;border:none;border-radius:var(--rs);font-size:16px;font-weight:600;cursor:pointer;margin-top:4px;font-family:inherit}
.sbtn2:active{opacity:.85}
.li{display:flex;align-items:flex-start;gap:8px;padding:11px 0;border-bottom:0.5px solid var(--bd)}
.li:last-child{border-bottom:none}
.lil{flex:1;min-width:0}
.tg{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;margin-bottom:3px}
.ti{background:var(--gnl);color:var(--gn)}
.ts{background:var(--aml);color:var(--am)}
.tr{background:var(--rdl);color:var(--rd)}
.tm{background:var(--aml);color:var(--am)}
.tb2{background:var(--ppl);color:var(--pp)}
.tx2{background:var(--bll);color:var(--bl)}
.ln{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ls{font-size:12px;color:var(--t3);margin-top:1px}
.lr{display:flex;align-items:center;gap:6px;flex-shrink:0}
.la{font-size:15px;font-weight:600;white-space:nowrap}
.la.p{color:var(--gn)}.la.m{color:var(--rd)}
.eb{background:none;border:none;cursor:pointer;color:var(--bl);padding:4px;font-size:18px;line-height:1}
.db{background:none;border:none;cursor:pointer;color:var(--t3);padding:4px;font-size:20px;line-height:1}
.pv{background:var(--gnl);border-radius:var(--rs);padding:10px 13px;margin:4px 0 10px;font-size:13px;color:var(--gn);display:none}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 18px;border-radius:24px;font-size:13px;white-space:nowrap;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.cp{display:inline-flex;align-items:center;gap:6px;background:var(--gyl);border:0.5px solid var(--bd);border-radius:20px;padding:6px 12px;margin:4px;font-size:13px}
.cp button{background:none;border:none;cursor:pointer;color:var(--t3);font-size:18px;line-height:1;padding:0}
.em{text-align:center;padding:28px 0;color:var(--t3);font-size:13px}
.gsb{background:var(--bll);border-radius:var(--r);padding:14px;margin-bottom:10px;border:0.5px solid rgba(24,95,165,.2)}
.gst{font-size:13px;font-weight:600;color:var(--bld);margin-bottom:6px}
.gsd{font-size:12px;color:var(--bl);line-height:1.8}
.dlb{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;background:#fff;border:0.5px solid var(--bd);border-radius:var(--rs);font-size:14px;font-weight:500;cursor:pointer;color:var(--tx);font-family:inherit;margin-bottom:8px}
.dlb svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
.ar{display:flex;align-items:center;padding:11px 0;border-bottom:0.5px solid var(--bd)}
.ar:last-child{border-bottom:none}
.ad{width:8px;height:8px;border-radius:50%;background:var(--bl);margin-right:10px;flex-shrink:0}
.ai{flex:1;min-width:0}
.an{font-size:14px;font-weight:500}
.anu{font-size:12px;color:var(--t3);margin-top:2px}
.av{font-size:14px;font-weight:600;margin-left:8px;white-space:nowrap}
.tts{display:flex;border:0.5px solid var(--bd);border-radius:var(--rs);overflow:hidden;margin-bottom:14px}
.tt{flex:1;padding:9px 2px;border:none;background:#fff;font-size:11px;font-weight:500;cursor:pointer;color:var(--t2);font-family:inherit;border-right:0.5px solid var(--bd)}
.tt:last-child{border-right:none}
.tt.on{background:var(--bl);color:#fff}
.ats{display:flex;overflow-x:auto;margin-bottom:12px;border-bottom:0.5px solid var(--bd);scrollbar-width:none}
.ats::-webkit-scrollbar{display:none}
.at{flex-shrink:0;padding:9px 14px;border:none;background:none;font-size:13px;font-weight:500;cursor:pointer;color:var(--t3);font-family:inherit;border-bottom:2px solid transparent;white-space:nowrap}
.at.on{color:var(--bl);border-bottom-color:var(--bl)}
.adc{background:var(--cd);border:0.5px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.adh{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer}
.adn{font-size:15px;font-weight:600}
.adv{font-size:15px;font-weight:700}
.adb{display:none;border-top:0.5px solid var(--bd);padding:0 14px}
.adb.open{display:block}
.sr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--bd);font-size:13px}
.sr:last-child{border-bottom:none}
.sr.tot{font-weight:700;font-size:14px;padding:10px 0}
.mw{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.mw.open{display:flex}
.md{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.mdt{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.mdc{background:none;border:none;font-size:24px;cursor:pointer;color:var(--t3);line-height:1;padding:0}
.mr{display:flex;gap:8px}.mr .fd{flex:1}
.wb{background:#FFF8E1;border:0.5px solid #F9A825;border-radius:var(--rs);padding:12px;font-size:12px;margin-bottom:10px;color:#5D4037;line-height:1.7}
.pg{background:var(--gyl);border-radius:var(--rs);padding:12px;font-size:13px;margin-top:8px;display:none;line-height:1.7}
@media(min-width:600px){body{max-width:480px;margin:0 auto}.tbr{max-width:480px;left:50%;transform:translateX(-50%)}}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div style="display:flex;align-items:center;gap:8px">
      <h1>생각키움연구소</h1>
      <span style="font-size:11px;opacity:.85;display:flex;align-items:center">
        <span class="cdot off" id="cdot"></span><span id="ctxt">로컬저장</span>
      </span>
    </div>
    <div class="hdr-sub">학원 재정 통합 관리</div>
  </div>
  <button class="sbtn" onclick="syncNow()" id="sbtn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    <span id="slbl">동기화</span>
  </button>
</div>
<div id="toast" class="toast"></div>

<!-- 홈 -->
<div id="s-home" class="sc on">
  <div class="pb"><input type="month" id="pf"><span>~</span><input type="month" id="pt"><button onclick="dash()">조회</button></div>
  <div class="nb"><div class="nl">이 기간 순이익</div><div class="nv" id="dnet">₩0</div></div>
  <div class="sg">
    <div class="sb"><div class="lb">총 수입</div><div class="vl g" id="dinc">₩0</div></div>
    <div class="sb"><div class="lb">강사 급여</div><div class="vl r" id="dsal">₩0</div></div>
    <div class="sb"><div class="lb">월세</div><div class="vl r" id="drent">₩0</div></div>
    <div class="sb"><div class="lb">관리비</div><div class="vl r" id="dmgmt">₩0</div></div>
    <div class="sb"><div class="lb">기장비</div><div class="vl r" id="dbk">₩0</div></div>
    <div class="sb"><div class="lb">세금 납부</div><div class="vl r" id="dtax">₩0</div></div>
  </div>
  <div class="st">학원별 현황</div>
  <div class="card" id="dacl"><div class="em">학원을 먼저 등록하세요</div></div>
</div>

<!-- 입력 -->
<div id="s-input" class="sc">
  <div class="card">
    <div class="tts">
      <button class="tt on" onclick="stype('inc',this)">수입</button>
      <button class="tt" onclick="stype('sal',this)">급여</button>
      <button class="tt" onclick="stype('rent',this)">월세</button>
      <button class="tt" onclick="stype('mgmt',this)">관리비</button>
      <button class="tt" onclick="stype('bk',this)">기장비</button>
      <button class="tt" onclick="stype('tax',this)">세금</button>
    </div>
    <div id="fac" class="fd"><label>학원</label><select id="iac"></select></div>
    <div id="ginc">
      <div class="fd"><label>연월</label><input type="month" id="iminc"></div>
      <div class="fd"><label>항목 (예: 수강료, 교재비)</label><input type="text" id="iname" placeholder="입력" lang="ko"></div>
      <div class="fd"><label>금액</label><input type="number" id="iamt" placeholder="0" inputmode="numeric"></div>
    </div>
    <div id="gsal" style="display:none">
      <div class="fd"><label>연월</label><input type="month" id="imsal"></div>
      <div class="fd"><label>강사 이름</label><input type="text" id="isname" placeholder="이름" lang="ko"></div>
      <div class="fd"><label>지급액</label><input type="number" id="isamt" placeholder="0" inputmode="numeric" oninput="csal()"></div>
      <div class="fd"><label>원천징수율 (기본 3.3%)</label><input type="number" id="israte" value="3.3" step="0.1" oninput="csal()"></div>
      <div id="spv" class="pv"></div>
    </div>
    <div id="grent" style="display:none">
      <div class="fd"><label>연월</label><input type="month" id="imrent"></div>
      <div class="fd"><label>항목명</label><input type="text" id="irname" placeholder="예: 1월 월세" lang="ko"></div>
      <div class="fd"><label>금액</label><input type="number" id="iramt" placeholder="0" inputmode="numeric"></div>
    </div>
    <div id="gmgmt" style="display:none">
      <div class="fd"><label>연월</label><input type="month" id="immgmt"></div>
      <div class="fd"><label>항목명</label><input type="text" id="imname" placeholder="예: 관리비, 전기세" lang="ko"></div>
      <div class="fd"><label>금액</label><input type="number" id="imamt" placeholder="0" inputmode="numeric"></div>
    </div>
    <div id="gbk" style="display:none">
      <div class="fd"><label>연월</label><input type="month" id="imbk"></div>
      <div class="fd"><label>세무사명/항목</label><input type="text" id="ibname" placeholder="예: 홍세무사 기장비" lang="ko"></div>
      <div class="fd"><label>금액</label><input type="number" id="ibamt" placeholder="0" inputmode="numeric"></div>
    </div>
    <div id="gtax" style="display:none">
      <div class="fd"><label>납부일</label><input type="date" id="itdate"></div>
      <div class="fd"><label>국세 / 지방세</label><select id="itkind"><option value="국세">국세</option><option value="지방세">지방세</option></select></div>
      <div class="fd"><label>세목 (예: 종합소득세, 부가가치세)</label><input type="text" id="itname" placeholder="직접 입력" lang="ko"></div>
      <div class="fd"><label>금액</label><input type="number" id="itamt" placeholder="0" inputmode="numeric"></div>
    </div>
    <button class="sbtn2" onclick="doSave()">저장</button>
  </div>
</div>

<!-- 내역 -->
<div id="s-history" class="sc">
  <div class="pb"><input type="month" id="hf"><span>~</span><input type="month" id="ht"><button onclick="rHist()">조회</button></div>
  <div style="display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap">
    <button class="qb" style="font-size:11px;padding:6px 9px;background:#fff;color:var(--tx);border:0.5px solid var(--bd)" onclick="hf2('')">전체</button>
    <button class="qb" style="font-size:11px;padding:6px 9px;background:var(--gnl);color:var(--gn);border:none" onclick="hf2('inc')">수입</button>
    <button class="qb" style="font-size:11px;padding:6px 9px;background:var(--aml);color:var(--am);border:none" onclick="hf2('sal')">급여</button>
    <button class="qb" style="font-size:11px;padding:6px 9px;background:var(--rdl);color:var(--rd);border:none" onclick="hf2('rent')">월세</button>
    <button class="qb" style="font-size:11px;padding:6px 9px;background:var(--aml);color:var(--am);border:none" onclick="hf2('mgmt')">관리비</button>
    <button class="qb" style="font-size:11px;padding:6px 9px;background:var(--ppl);color:var(--pp);border:none" onclick="hf2('bk')">기장비</button>
    <button class="qb" style="font-size:11px;padding:6px 9px;background:var(--bll);color:var(--bl);border:none" onclick="hf2('tax')">세금</button>
  </div>
  <div id="hlist"></div>
</div>

<!-- 학원별 -->
<div id="s-byac" class="sc">
  <div class="pb"><input type="month" id="bf"><span>~</span><input type="month" id="bt"><button onclick="rByac()">조회</button></div>
  <div class="ats" id="atabs"></div>
  <div id="acont"></div>
</div>

<!-- 설정 -->
<div id="s-set" class="sc">
  <div class="card">
    <div class="st" style="margin-top:0">기간 선택 후 다운로드</div>
    <div class="fd"><label>시작 연월</label><input type="month" id="dlf"></div>
    <div class="fd"><label>종료 연월</label><input type="month" id="dlt"></div>
    <button class="dlb" onclick="dlCSV()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>CSV 다운로드 (엑셀에서 열기)</button>
    <button class="dlb" onclick="dlJSON()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>전체 백업 (JSON)</button>
    <button class="dlb" onclick="document.getElementById('rfile').click()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3" transform="rotate(180 12 12)"/></svg>백업 복원</button>
    <input type="file" id="rfile" accept=".json" style="display:none" onchange="doRestore(this)">
  </div>
  <div class="card">
    <div class="st" style="margin-top:0">구글 시트 연동</div>
    <div class="wb">
      ⚠️ <b>동기화 방식</b><br>
      • 입력·수정·삭제 즉시 구글 시트 자동 저장<br>
      • 동기화 버튼 = 구글 시트 최신 데이터 불러오기<br>
      • 여러 기기: 한 기기 입력 → 다른 기기 동기화 버튼
    </div>
    <div class="fd"><label>Google Apps Script URL</label>
      <input type="text" id="gsurl" placeholder="https://script.google.com/macros/s/.../exec" style="font-size:12px">
    </div>
    <button class="sbtn2" style="background:var(--gn)" onclick="saveUrl()">연동 저장</button>
    <div class="pg" id="spg"></div>
  </div>
  <div class="card">
    <div class="st" style="margin-top:0">구글 시트 초기화</div>
    <div style="font-size:12px;color:var(--t2);margin-bottom:10px;line-height:1.7">데이터가 꼬였을 때 사용.<br>이 기기 데이터를 구글 시트에 완전히 덮어씁니다.</div>
    <button class="sbtn2" style="background:var(--rd)" onclick="forceOW()">이 기기 데이터로 구글 시트 초기화</button>
    <div class="pg" id="owpg"></div>
  </div>
  <div class="card">
    <div class="st" style="margin-top:0">학원 관리</div>
    <div class="fd"><label>학원 이름</label><input type="text" id="acni" placeholder="예: 장기동(생각키움)" lang="ko"></div>
    <button class="sbtn2" style="background:var(--gy)" onclick="addAc()">학원 추가</button>
    <div class="st">등록된 학원</div>
    <div id="achips"></div>
  </div>
</div>

<!-- 하단 탭 -->
<div class="tbr">
  <button class="tb on" onclick="go('home',this)"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>홈</button>
  <button class="tb" onclick="go('input',this)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>입력</button>

<script>
'use strict';
/* ═══════════ 상수 & 상태 ═══════════ */
const VER='v7';
const LKEY='acmgr_'+VER;
let db={acs:[],rows:[],url:''};
let ctype='inc', hflt='', bacid='all', eid=null, syncing=false;

/* ═══════════ KST 날짜 ═══════════ */
function kstYM(){const d=new Date(),k=new Date(d.getTime()+9*3600000);return k.toISOString().slice(0,7)}
function kstD(){const d=new Date(),k=new Date(d.getTime()+9*3600000);return k.toISOString().slice(0,10)}
// month 필드 정규화: ISO datetime → KST YYYY-MM
function normM(m){
  if(!m)return '';
  m=String(m);
  if(m.length>7&&m.includes('T')){
    const k=new Date(new Date(m).getTime()+9*3600000);
    return k.toISOString().slice(0,7);
  }
  return m.slice(0,7);
}
// 전체 entries month 정규화
function normAll(){db.rows.forEach(r=>{r.month=normM(r.month)})}

/* ═══════════ 저장/로드 ═══════════ */
function save(){
  try{
    localStorage.setItem(LKEY+'_m',JSON.stringify({acs:db.acs,url:db.url,v:7}));
    const byM={};
    db.rows.forEach(r=>{const k=r.month||'0000-00';(byM[k]=byM[k]||[]).push(r)});
    Object.keys(localStorage).filter(k=>k.startsWith(LKEY+'_r_')).forEach(k=>localStorage.removeItem(k));
    Object.entries(byM).forEach(([m,a])=>localStorage.setItem(LKEY+'_r_'+m,JSON.stringify(a)));
    localStorage.setItem(LKEY+'_i',JSON.stringify(Object.keys(byM)));
  }catch(e){console.warn(e)}
}
function load(){
  try{
    const m=localStorage.getItem(LKEY+'_m');
    const i=localStorage.getItem(LKEY+'_i');
    if(m&&i){
      const md=JSON.parse(m);
      let rows=[];
      JSON.parse(i).forEach(k=>{try{const c=localStorage.getItem(LKEY+'_r_'+k);if(c)rows=rows.concat(JSON.parse(c))}catch(e){}});
      db={acs:md.acs||[],rows,url:md.url||''};
      normAll();
      return;
    }
    // 구버전 마이그레이션
    for(const k of['acmgr_v6_meta','acmgr_v5_meta','acmgr_v4']){
      const d=localStorage.getItem(k);
      if(d){try{const p=JSON.parse(d);if(p.academies||p.entries){db={acs:p.academies||[],rows:p.entries||[],url:p.gsUrl||''};normAll();save();return}}catch(e){}}
    }
  }catch(e){console.warn(e)}
}

/* ═══════════ 유틸 ═══════════ */
const W=n=>'₩'+Math.round(n||0).toLocaleString('ko-KR');
function toast(msg,d=1800){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),d)}
function setC(on){document.getElementById('cdot').className='cdot '+(on?'on':'off');document.getElementById('ctxt').textContent=on?'구글시트연동':'로컬저장'}
function setSL(t){const e=document.getElementById('slbl');if(e)e.textContent=t}
function pg(id,msg){const e=document.getElementById(id);if(e){e.style.display='block';e.textContent=msg}}
function hpg(id,msg,ms=4000){const e=document.getElementById(id);if(e){e.textContent=msg||'';setTimeout(()=>{if(e)e.style.display='none'},ms)}}
function uid(){return Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8)}

/* ═══════════ 탭 ═══════════ */
function go(n,b){
  document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));
  document.getElementById('s-'+n).classList.add('on');b.classList.add('on');
  if(n==='home')dash();
  if(n==='history')rHist();
  if(n==='byac')rByac();
  if(n==='set'){rChips();document.getElementById('gsurl').value=db.url||''}
  if(n==='input')rAcSel();
}
function stype(t,b){
  ctype=t;
  document.querySelectorAll('.tt').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  ['inc','sal','rent','mgmt','bk','tax'].forEach(x=>document.getElementById('g'+x).style.display=x===t?'block':'none');
  document.getElementById('fac').style.display=t==='tax'?'none':'block';
}

/* ═══════════ 급여 미리보기 ═══════════ */
function csal(){
  const a=parseFloat(document.getElementById('isamt').value)||0;
  const r=parseFloat(document.getElementById('israte').value)||3.3;
  const p=document.getElementById('spv');
  if(a){p.style.display='block';p.textContent=`공제 ${W(Math.round(a*r/100))} → 실지급 ${W(a-Math.round(a*r/100))}`}else p.style.display='none';
}
function cEsal(){
  const a=parseFloat(document.getElementById('em-samt').value)||0;
  const r=parseFloat(document.getElementById('em-srate').value)||3.3;
  const p=document.getElementById('em-spv');
  if(a){p.style.display='block';p.textContent=`공제 ${W(Math.round(a*r/100))} → 실지급 ${W(a-Math.round(a*r/100))}`}else p.style.display='none';
}

/* ═══════════ 학원 셀렉트 ═══════════ */
function rAcSel(){
  const s=document.getElementById('iac');
  s.innerHTML=db.acs.length?db.acs.map(a=>`<option value="${a.id}">${a.name}</option>`).join(''):'<option value="">학원을 먼저 등록하세요</option>';
}
function fillSel(id){
  const s=document.getElementById(id);
  if(s)s.innerHTML=db.acs.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
}

/* ═══════════ 저장 ═══════════ */
function doSave(){
  const acid=document.getElementById('iac').value;
  const acnm=db.acs.find(a=>a.id===acid)?.name||'';
  const t=ctype;
  let row={id:uid(),type:t,acId:acid,acName:acnm,ts:Date.now()};

  if(t==='inc'){
    const m=document.getElementById('iminc').value;
    const n=document.getElementById('iname').value.trim();
    const a=parseFloat(document.getElementById('iamt').value)||0;
    if(!acid){toast('학원을 먼저 등록하세요');return}
    if(!m||!n||!a){toast('연월, 항목, 금액을 모두 입력하세요');return}
    Object.assign(row,{month:m,name:n,amount:a});
    document.getElementById('iname').value='';document.getElementById('iamt').value='';
  }else if(t==='sal'){
    const m=document.getElementById('imsal').value;
    const n=document.getElementById('isname').value.trim();
    const a=parseFloat(document.getElementById('isamt').value)||0;
    const r=parseFloat(document.getElementById('israte').value)||3.3;
    if(!acid){toast('학원을 먼저 등록하세요');return}
    if(!m||!n||!a){toast('연월, 이름, 금액을 모두 입력하세요');return}
    const tx=Math.round(a*r/100);
    Object.assign(row,{month:m,name:n,amount:a,rate:r,taxAmt:tx,net:a-tx});
    document.getElementById('isname').value='';document.getElementById('isamt').value='';document.getElementById('spv').style.display='none';
  }else if(t==='rent'){
    const m=document.getElementById('imrent').value;
    const n=document.getElementById('irname').value.trim();
    const a=parseFloat(document.getElementById('iramt').value)||0;
    if(!acid){toast('학원을 먼저 등록하세요');return}
    if(!m||!a){toast('연월과 금액을 입력하세요');return}
    Object.assign(row,{month:m,name:n||'월세',amount:a});
    document.getElementById('irname').value='';document.getElementById('iramt').value='';
  }else if(t==='mgmt'){
    const m=document.getElementById('immgmt').value;
    const n=document.getElementById('imname').value.trim();
    const a=parseFloat(document.getElementById('imamt').value)||0;
    if(!acid){toast('학원을 먼저 등록하세요');return}
    if(!m||!a){toast('연월과 금액을 입력하세요');return}
    Object.assign(row,{month:m,name:n||'관리비',amount:a});
    document.getElementById('imname').value='';document.getElementById('imamt').value='';
  }else if(t==='bk'){
    const m=document.getElementById('imbk').value;
    const n=document.getElementById('ibname').value.trim();
    const a=parseFloat(document.getElementById('ibamt').value)||0;
    if(!acid){toast('학원을 먼저 등록하세요');return}
    if(!m||!a){toast('연월과 금액을 입력하세요');return}
    Object.assign(row,{month:m,name:n||'기장비',amount:a});
    document.getElementById('ibname').value='';document.getElementById('ibamt').value='';
  }else if(t==='tax'){
    const dt=document.getElementById('itdate').value;
    const kd=document.getElementById('itkind').value;
    const n=document.getElementById('itname').value.trim();
    const a=parseFloat(document.getElementById('itamt').value)||0;
    if(!dt||!n||!a){toast('날짜, 세목, 금액을 모두 입력하세요');return}
    Object.assign(row,{month:dt.slice(0,7),date:dt,kind:kd,name:n,amount:a,acId:'',acName:''});
    document.getElementById('itname').value='';document.getElementById('itamt').value='';
  }

  db.rows.push(row);
  save();push();
  toast('저장되었습니다');
}

/* ═══════════ 대시보드 ═══════════ */
function dash(){
  const f=document.getElementById('pf').value;
  const t=document.getElementById('pt').value;
  const ok=r=>{const m=r.month||'';return(!f||m>=f)&&(!t||m<=t)};
  const sm=tp=>db.rows.filter(r=>r.type===tp&&ok(r)).reduce((s,r)=>s+(Number(r.amount)||0),0);
  const inc=sm('inc'),sal=sm('sal'),rent=sm('rent'),mgmt=sm('mgmt'),bk=sm('bk'),tax=sm('tax');
  const net=inc-sal-rent-mgmt-bk-tax;
  ['dinc','dsal','drent','dmgmt','dbk','dtax'].forEach((id,i)=>{
    document.getElementById(id).textContent=W([inc,sal,rent,mgmt,bk,tax][i]);
  });
  const ne=document.getElementById('dnet');ne.textContent=W(net);ne.style.color=net>=0?'var(--gn)':'var(--rd)';
  const el=document.getElementById('dacl');
  if(!db.acs.length){el.innerHTML='<div class="em">학원을 먼저 등록하세요</div>';return}
  el.innerHTML=db.acs.map(a=>{
    const fi=r=>r.acId===a.id&&ok(r);
    const ai=db.rows.filter(r=>fi(r)&&r.type==='inc').reduce((s,r)=>s+(Number(r.amount)||0),0);
    const as=db.rows.filter(r=>fi(r)&&r.type==='sal').reduce((s,r)=>s+(Number(r.amount)||0),0);
    const ar=db.rows.filter(r=>fi(r)&&r.type==='rent').reduce((s,r)=>s+(Number(r.amount)||0),0);
    const am=db.rows.filter(r=>fi(r)&&r.type==='mgmt').reduce((s,r)=>s+(Number(r.amount)||0),0);
    const ab=db.rows.filter(r=>fi(r)&&r.type==='bk').reduce((s,r)=>s+(Number(r.amount)||0),0);
    const an=ai-as-ar-am-ab;
    return `<div class="ar"><div class="ad"></div><div class="ai"><div class="an">${a.name}</div><div class="anu">수입 ${W(ai)} / 급여 ${W(as)} / 월세 ${W(ar)} / 관리비 ${W(am)} / 기장비 ${W(ab)}</div></div><div class="av" style="color:${an>=0?'var(--gn)':'var(--rd)'}">${W(an)}</div></div>`;
  }).join('');
}

/* ═══════════ 내역 ═══════════ */
function hf2(t){hflt=t;rHist()}
function rHist(){
  const f=document.getElementById('hf').value,t=document.getElementById('ht').value;
  const rows=db.rows.filter(r=>(!f||r.month>=f)&&(!t||r.month<=t)&&(!hflt||r.type===hflt)).sort((a,b)=>b.ts-a.ts);
  const el=document.getElementById('hlist');
  if(!rows.length){el.innerHTML='<div class="em">내역이 없습니다</div>';return}
  const lb={inc:'수입',sal:'급여',rent:'월세',mgmt:'관리비',bk:'기장비',tax:'세금'};
  const tc={inc:'ti',sal:'ts',rent:'tr',mgmt:'tm',bk:'tb2',tax:'tx2'};
  const gp={};rows.forEach(r=>{(gp[r.month]=gp[r.month]||[]).push(r)});
  el.innerHTML=Object.keys(gp).sort((a,b)=>b.localeCompare(a)).map(m=>{
    const its=gp[m].map(r=>`<div class="li">
      <div class="lil"><span class="tg ${tc[r.type]}">${lb[r.type]||r.type}${r.kind?' · '+r.kind:''}</span>
      <div class="ln">${r.acName?r.acName+' · ':''}${r.name||''}</div>
      <div class="ls">${r.month||''}${r.type==='sal'?'  실지급 '+W(r.net):''}</div></div>
      <div class="lr"><div class="la ${r.type==='inc'?'p':'m'}">${r.type==='inc'?'':'-'}${W(r.amount)}</div>
      <button class="eb" onclick="openEM('${r.id}')">✎</button>
      <button class="db" onclick="delR('${r.id}')">×</button></div></div>`).join('');
    return `<div style="font-size:12px;font-weight:600;color:var(--t2);margin:10px 0 4px">${m}</div><div class="card" style="padding:0 14px">${its}</div>`;
  }).join('');
}
function delR(id){if(!confirm('삭제할까요?'))return;db.rows=db.rows.filter(r=>r.id!==id);save();push();rHist();dash();toast('삭제되었습니다')}

/* ═══════════ 학원별 ═══════════ */
function sBAc(id){bacid=id;rByac()}
function tAD(id){const e=document.getElementById(id);if(e)e.classList.toggle('open')}
function rByac(){
  const f=document.getElementById('bf').value,t=document.getElementById('bt').value;
  const ok=r=>{const m=r.month||'';return(!f||m>=f)&&(!t||m<=t)};
  document.getElementById('atabs').innerHTML=
    `<button class="at ${bacid==='all'?'on':''}" onclick="sBAc('all')">전체</button>`+
    db.acs.map(a=>`<button class="at ${bacid===a.id?'on':''}" onclick="sBAc('${a.id}')">${a.name}</button>`).join('');
  const el=document.getElementById('acont');
  if(!db.acs.length){el.innerHTML='<div class="em">학원을 먼저 등록하세요</div>';return}
  const lb={inc:'수입',sal:'급여',rent:'월세',mgmt:'관리비',bk:'기장비',tax:'세금'};
  const etypes=['sal','rent','mgmt','bk'];
  if(bacid==='all'){
    const rs=db.rows.filter(ok);
    const ti=rs.filter(r=>r.type==='inc').reduce((s,r)=>s+(Number(r.amount)||0),0);
    const te=['sal','rent','mgmt','bk','tax'].reduce((s,tp)=>s+rs.filter(r=>r.type===tp).reduce((ss,r)=>ss+(Number(r.amount)||0),0),0);
    const cards=db.acs.map(a=>{
      const ar=rs.filter(r=>r.acId===a.id);
      const ai=ar.filter(r=>r.type==='inc').reduce((s,r)=>s+(Number(r.amount)||0),0);
      const ae=etypes.reduce((s,tp)=>s+ar.filter(r=>r.type===tp).reduce((ss,r)=>ss+(Number(r.amount)||0),0),0);
      const an=ai-ae;
      const dt=etypes.map(tp=>{const v=ar.filter(r=>r.type===tp).reduce((s,r)=>s+(Number(r.amount)||0),0);return v?`<div class="sr"><span>${lb[tp]}</span><span>−${W(v)}</span></div>`:''}).join('');
      return `<div class="adc"><div class="adh" onclick="tAD('bd-${a.id}')"><span class="adn">${a.name}</span><span class="adv" style="color:${an>=0?'var(--gn)':'var(--rd)'}">${W(an)}</span></div>
        <div class="adb" id="bd-${a.id}">
          <div class="sr"><span style="color:var(--gn)">수입</span><span style="color:var(--gn);font-weight:600">${W(ai)}</span></div>
          ${dt}<div class="sr tot" style="border-top:1px solid var(--bd)"><span>순이익</span><span style="color:${an>=0?'var(--gn)':'var(--rd)'}">${W(an)}</span></div>
        </div></div>`;
    }).join('');
    el.innerHTML=`<div class="nb" style="margin-bottom:10px"><div class="nl">전체 순이익</div><div class="nv" style="color:${(ti-te)>=0?'var(--gn)':'var(--rd)'}">${W(ti-te)}</div></div>
      <div class="sg" style="margin-bottom:10px"><div class="sb"><div class="lb">총 수입</div><div class="vl g">${W(ti)}</div></div><div class="sb"><div class="lb">총 지출</div><div class="vl r">${W(te)}</div></div></div>${cards}`;
    return;
  }
  const ac=db.acs.find(a=>a.id===bacid);if(!ac){el.innerHTML='';return}
  const ar=db.rows.filter(r=>r.acId===ac.id&&ok(r));
  const tx=db.rows.filter(r=>r.type==='tax'&&ok(r));
  const ti=ar.filter(r=>r.type==='inc').reduce((s,r)=>s+(Number(r.amount)||0),0);
  const te=etypes.reduce((s,tp)=>s+ar.filter(r=>r.type===tp).reduce((ss,r)=>ss+(Number(r.amount)||0),0),0);
  const ih=ar.filter(r=>r.type==='inc').sort((a,b)=>b.month.localeCompare(a.month))
    .map(r=>`<div class="li"><div class="lil"><div class="ln">${r.name}</div><div class="ls">${r.month}</div></div>
      <div class="lr"><div class="la p">${W(r.amount)}</div><button class="eb" onclick="openEM('${r.id}')">✎</button><button class="db" onclick="delR2('${r.id}')">×</button></div></div>`).join('')||'<div class="em">없음</div>';
  let eh='';
  etypes.forEach(tp=>{
    const rs2=ar.filter(r=>r.type===tp).sort((a,b)=>b.month.localeCompare(a.month));
    if(!rs2.length)return;
    eh+=`<div style="font-size:12px;font-weight:600;color:var(--t2);margin:8px 0 4px">${lb[tp]} 합계 ${W(rs2.reduce((s,r)=>s+(Number(r.amount)||0),0))}</div>`;
    eh+=rs2.map(r=>`<div class="li"><div class="lil"><div class="ln">${r.name}</div><div class="ls">${r.month}${tp==='sal'?' 실지급 '+W(r.net):''}</div></div>
      <div class="lr"><div class="la m">−${W(r.amount)}</div><button class="eb" onclick="openEM('${r.id}')">✎</button><button class="db" onclick="delR2('${r.id}')">×</button></div></div>`).join('');
  });
  el.innerHTML=`<div class="nb" style="margin-bottom:10px"><div class="nl">${ac.name} 순이익</div><div class="nv" style="color:${(ti-te)>=0?'var(--gn)':'var(--rd)'}">${W(ti-te)}</div></div>
    <div class="sg" style="margin-bottom:10px"><div class="sb"><div class="lb">수입</div><div class="vl g">${W(ti)}</div></div><div class="sb"><div class="lb">지출</div><div class="vl r">${W(te)}</div></div></div>
    <div style="font-size:13px;font-weight:700;color:var(--gn);margin:10px 0 4px">수입 내역</div><div class="card" style="padding:0 14px">${ih}</div>
    <div style="font-size:13px;font-weight:700;color:var(--rd);margin:10px 0 4px">지출 내역</div><div class="card" style="padding:0 14px">${eh||'<div class="em">없음</div>'}</div>
    ${tx.length?`<div style="font-size:13px;font-weight:700;color:var(--bl);margin:10px 0 4px">세금 납부 (전체)</div><div class="card" style="padding:0 14px">${tx.sort((a,b)=>b.month.localeCompare(a.month)).map(r=>`<div class="li"><div class="lil"><div class="ln">${r.kind||''} ${r.name||''}</div><div class="ls">${r.month||''}</div></div><div class="lr"><div class="la m">−${W(r.amount)}</div></div></div>`).join('')}</div>`:''}`;
}
function delR2(id){if(!confirm('삭제할까요?'))return;db.rows=db.rows.filter(r=>r.id!==id);save();push();rByac();dash();toast('삭제되었습니다')}

/* ═══════════ 학원 관리 ═══════════ */
function addAc(){
  const n=document.getElementById('acni').value.trim();
  if(!n){toast('이름을 입력하세요');return}
  if(db.acs.find(a=>a.name===n)){toast('이미 등록된 학원입니다');return}
  db.acs.push({id:uid(),name:n});
  save();push();document.getElementById('acni').value='';rChips();rAcSel();toast(n+' 등록 완료');
}
function delAc(id){
  const a=db.acs.find(x=>x.id===id);
  if(!confirm((a?.name||'')+'을 삭제할까요?\n관련 내역도 삭제됩니다.'))return;
  db.acs=db.acs.filter(x=>x.id!==id);db.rows=db.rows.filter(r=>r.acId!==id);
  save();push();rChips();rAcSel();toast('삭제되었습니다');
}
function rChips(){
  const el=document.getElementById('achips');
  if(!db.acs.length){el.innerHTML='<div class="em">등록된 학원이 없습니다</div>';return}
  el.innerHTML=db.acs.map(a=>`<span class="cp">${a.name}<button onclick="delAc('${a.id}')">×</button></span>`).join('');
}

/* ═══════════ 수정 모달 ═══════════ */
function openEM(id){
  const r=db.rows.find(x=>x.id===id);if(!r)return;
  eid=id;
  const lb={inc:'수입',sal:'급여',rent:'월세',mgmt:'관리비',bk:'기장비',tax:'세금'};
  ['inc','sal','rent','mgmt','bk','tax'].forEach(t=>document.getElementById('em-'+t).style.display=t===r.type?'block':'none');
  document.getElementById('emtitle').textContent=lb[r.type]+' 수정';
  if(r.type==='inc'){fillSel('em-ac-inc');document.getElementById('em-minc').value=r.month||'';document.getElementById('em-ac-inc').value=r.acId||'';document.getElementById('em-iname').value=r.name||'';document.getElementById('em-iamt').value=r.amount||''}
  else if(r.type==='sal'){fillSel('em-ac-sal');document.getElementById('em-msal').value=r.month||'';document.getElementById('em-ac-sal').value=r.acId||'';document.getElementById('em-sname').value=r.name||'';document.getElementById('em-samt').value=r.amount||'';document.getElementById('em-srate').value=r.rate||3.3;cEsal()}
  else if(r.type==='rent'){fillSel('em-ac-rent');document.getElementById('em-mrent').value=r.month||'';document.getElementById('em-ac-rent').value=r.acId||'';document.getElementById('em-rname').value=r.name||'';document.getElementById('em-ramt').value=r.amount||''}
  else if(r.type==='mgmt'){fillSel('em-ac-mgmt');document.getElementById('em-mmgmt').value=r.month||'';document.getElementById('em-ac-mgmt').value=r.acId||'';document.getElementById('em-mname').value=r.name||'';document.getElementById('em-mamt').value=r.amount||''}
  else if(r.type==='bk'){fillSel('em-ac-bk');document.getElementById('em-mbk').value=r.month||'';document.getElementById('em-ac-bk').value=r.acId||'';document.getElementById('em-bname').value=r.name||'';document.getElementById('em-bamt').value=r.amount||''}
  else if(r.type==='tax'){document.getElementById('em-tdate').value=r.date||r.month+'-01';document.getElementById('em-tkind').value=r.kind||'국세';document.getElementById('em-tname').value=r.name||'';document.getElementById('em-tamt').value=r.amount||''}
  document.getElementById('emod').classList.add('open');
}
function closeEM(){document.getElementById('emod').classList.remove('open');eid=null}
function cmod(e){if(e.target===document.getElementById('emod'))closeEM()}
function doEdit(){
  const i=db.rows.findIndex(x=>x.id===eid);if(i<0)return;
  const r=db.rows[i];const t=r.type;
  if(t==='inc'){const acid=document.getElementById('em-ac-inc').value;const m=document.getElementById('em-minc').value;const n=document.getElementById('em-iname').value.trim();const a=parseFloat(document.getElementById('em-iamt').value)||0;if(!m||!n||!a){toast('모두 입력하세요');return}Object.assign(db.rows[i],{acId:acid,acName:db.acs.find(x=>x.id===acid)?.name||'',month:m,name:n,amount:a,ts:Date.now()})}
  else if(t==='sal'){const acid=document.getElementById('em-ac-sal').value;const m=document.getElementById('em-msal').value;const n=document.getElementById('em-sname').value.trim();const a=parseFloat(document.getElementById('em-samt').value)||0;const rv=parseFloat(document.getElementById('em-srate').value)||3.3;if(!m||!n||!a){toast('모두 입력하세요');return}const tx=Math.round(a*rv/100);Object.assign(db.rows[i],{acId:acid,acName:db.acs.find(x=>x.id===acid)?.name||'',month:m,name:n,amount:a,rate:rv,taxAmt:tx,net:a-tx,ts:Date.now()})}
  else if(t==='rent'){const acid=document.getElementById('em-ac-rent').value;const m=document.getElementById('em-mrent').value;const n=document.getElementById('em-rname').value.trim();const a=parseFloat(document.getElementById('em-ramt').value)||0;if(!m||!a){toast('모두 입력하세요');return}Object.assign(db.rows[i],{acId:acid,acName:db.acs.find(x=>x.id===acid)?.name||'',month:m,name:n||'월세',amount:a,ts:Date.now()})}
  else if(t==='mgmt'){const acid=document.getElementById('em-ac-mgmt').value;const m=document.getElementById('em-mmgmt').value;const n=document.getElementById('em-mname').value.trim();const a=parseFloat(document.getElementById('em-mamt').value)||0;if(!m||!a){toast('모두 입력하세요');return}Object.assign(db.rows[i],{acId:acid,acName:db.acs.find(x=>x.id===acid)?.name||'',month:m,name:n||'관리비',amount:a,ts:Date.now()})}
  else if(t==='bk'){const acid=document.getElementById('em-ac-bk').value;const m=document.getElementById('em-mbk').value;const n=document.getElementById('em-bname').value.trim();const a=parseFloat(document.getElementById('em-bamt').value)||0;if(!m||!a){toast('모두 입력하세요');return}Object.assign(db.rows[i],{acId:acid,acName:db.acs.find(x=>x.id===acid)?.name||'',month:m,name:n||'기장비',amount:a,ts:Date.now()})}
  else if(t==='tax'){const dt=document.getElementById('em-tdate').value;const kd=document.getElementById('em-tkind').value;const n=document.getElementById('em-tname').value.trim();const a=parseFloat(document.getElementById('em-tamt').value)||0;if(!dt||!n||!a){toast('모두 입력하세요');return}Object.assign(db.rows[i],{month:dt.slice(0,7),date:dt,kind:kd,name:n,amount:a,ts:Date.now()})}
  save();push();closeEM();rHist();dash();toast('수정되었습니다');
}
function delFromMod(){if(!confirm('삭제할까요?'))return;db.rows=db.rows.filter(r=>r.id!==eid);save();push();closeEM();rHist();dash();toast('삭제되었습니다')}

/* ═══════════ 다운로드 ═══════════ */
function dlCSV(){
  const f=document.getElementById('dlf').value,t=document.getElementById('dlt').value;
  const rows=db.rows.filter(r=>(!f||r.month>=f)&&(!t||r.month<=t)).sort((a,b)=>(a.month||'').localeCompare(b.month||''));
  if(!rows.length){toast('해당 기간 내역 없음');return}
  const lb={inc:'수입',sal:'강사급여',rent:'월세',mgmt:'관리비',bk:'기장비',tax:'세금납부'};
  const lines=[['연월','학원','구분','항목','금액','공제세액','실지급','세목','납부일'].join(',')];
  rows.forEach(r=>lines.push([r.month,r.acName||'',lb[r.type]||r.type,r.name||'',r.amount||0,r.taxAmt||'',r.net||'',r.kind||'',r.date||''].map(v=>`"${v}"`).join(',')));
  const sm={inc:0,sal:0,rent:0,mgmt:0,bk:0,tax:0};
  rows.forEach(r=>{if(sm[r.type]!==undefined)sm[r.type]+=(Number(r.amount)||0)});
  lines.push('');lines.push(`"합계","총수입:${sm.inc}","총급여:${sm.sal}","총월세:${sm.rent}","총관리비:${sm.mgmt}","총기장비:${sm.bk}","총세금:${sm.tax}","순이익:${sm.inc-sm.sal-sm.rent-sm.mgmt-sm.bk-sm.tax}"`);
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8'}));a.download=`학원재정_${f||'전체'}_${t||''}.csv`;a.click();toast('CSV 다운로드 완료');
}
function dlJSON(){
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify({v:7,at:new Date().toISOString(),db})],{type:'application/json'}));a.download=`학원재정_백업_${kstD()}.json`;a.click();toast('백업 완료');
}
function doRestore(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      const rs=d.db||d;
      const acs=rs.acs||rs.academies||[];
      const rows=rs.rows||rs.entries||[];
      if(!Array.isArray(acs)||!Array.isArray(rows)){toast('올바른 백업 파일이 아닙니다');return}
      if(!confirm('현재 데이터를 덮어씁니다. 계속할까요?'))return;
      db={acs,rows,url:db.url};normAll();save();push();rAll();toast('복원 완료');
    }catch{toast('파일을 읽을 수 없습니다')}
    inp.value='';
  };
  r.readAsText(f);
}

/* ═══════════ 구글 시트 동기화 ═══════════
   원칙: 구글 시트 = 단일 기준
   push: 로컬 → 구글 시트 (덮어쓰기)
   pull: 구글 시트 → 로컬 (덮어쓰기, 병합 없음)
══════════════════════════════════════════ */
function saveUrl(){
  const u=document.getElementById('gsurl').value.trim();
  db.url=u;save();setC(!!u);
  toast(u?'연동 저장 완료':'연동 해제됨',2000);
}
async function push(){
  if(!db.url)return;
  try{
    const res=await fetch(db.url,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'syncAll',db:{academies:db.acs,entries:db.rows}})});
    const d=await res.json();
    if(d.status==='ok')setC(true);
  }catch(e){console.warn('push fail',e)}
}
async function pull(){
  if(!db.url)return null;
  try{
    const res=await fetch(db.url+'?action=getAll&t='+Date.now(),{cache:'no-store'});
    if(!res.ok)return null;
    const d=await res.json();
    return d.status==='ok'?d:null;
  }catch(e){return null}
}
function applyRemote(d){
  if(!d)return false;
  // 구글 시트 데이터 그대로 교체 + month KST 정규화
  const rows=(d.entries||[]).map(r=>({...r,month:normM(r.month)}));
  const acs=d.academies||[];
  // 학원 이름 기준 중복 제거 (다른 기기에서 같은 이름으로 만든 경우)
  const acMap=new Map();
  acs.forEach(a=>{if(a.name&&!acMap.has(a.name))acMap.set(a.name,a)});
  db.rows=rows;
  db.acs=Array.from(acMap.values());
  save();
  return true;
}
async function syncNow(){
  if(!db.url){toast('설정 탭에서 구글 시트 URL을 먼저 입력하세요',3000);return}
  if(syncing){toast('동기화 중입니다...');return}
  syncing=true;setSL('동기화 중...');
  try{
    const d=await pull();
    if(!d){toast('서버 응답 없음',3000);setC(false)}
    else{applyRemote(d);rAll();toast('동기화 완료 — 총 '+db.rows.length+'건');setC(true)}
  }catch(e){toast('오류: '+e.message,3000);setC(false)}
  syncing=false;setSL('동기화');
}
async function forceOW(){
  if(!db.url){toast('URL을 먼저 입력하세요',3000);return}
  if(!confirm('구글 시트를 이 기기 데이터로 완전히 덮어씁니다.\n다른 기기의 데이터는 사라집니다. 계속할까요?'))return;
  pg('owpg','⏳ 구글 시트에 업로드 중...');
  try{
    await push();
    hpg('owpg','✅ 완료! '+db.rows.length+'건 업로드됨',5000);
    setC(true);toast('초기화 완료');
  }catch(e){hpg('owpg','❌ 실패: '+e.message,5000)}
}

/* ═══════════ 전체 렌더 ═══════════ */
function rAll(){
  dash();
  if(document.getElementById('s-history').classList.contains('on'))rHist();
  if(document.getElementById('s-byac').classList.contains('on'))rByac();
  rChips();rAcSel();
}

/* ═══════════ 초기화 ═══════════ */
function init(){
  load();
  const m=kstYM(),d=kstD();
  ['pf','pt','hf','ht','bf','bt','iminc','imsal','imrent','immgmt','imbk'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=m});
  document.getElementById('itdate').value=d;
  document.getElementById('dlf').value=m;document.getElementById('dlt').value=m;
  // 기본 학원 없으면 추가 안 함 (사용자가 직접 등록)
  rAcSel();rChips();dash();setC(!!db.url);
  // 앱 시작 시 자동 pull
  if(db.url){
    setSL('불러오는 중...');
    pull().then(d=>{
      if(d){applyRemote(d);rAll();setC(true);toast('최신 데이터 불러옴',1500)}
      setSL('동기화');
    }).catch(()=>setSL('동기화'));
  }
}
init();
</script>
